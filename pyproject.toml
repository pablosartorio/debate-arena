[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
# E: errores de estilo (PEP8)
# F: errores lógicos (variables no usadas, imports no usados)
# I: orden de imports
# UP: sugerencias para modernizar código Python

[tool.ruff.lint.isort]
known-first-party = ["agents", "db", "graph", "tools", "events"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
asyncio_mode = "auto"
